<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script>if(location.hostname!=="admin.cyxclub.top"&&location.hostname!=="localhost"){document.documentElement.style.display="none";}</script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>员工登录 - CYX俱乐部</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 登录页面专属样式 */
        .auth-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .auth-hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 60px;
            background: linear-gradient(135deg, var(--darker-bg) 0%, var(--dark-bg) 50%, #1a1a10 100%);
            position: relative;
            overflow: hidden;
        }

        .auth-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(249,249,0,0.04) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(249,249,0,0.03) 0%, transparent 40%);
            animation: rotateSlow 60s linear infinite;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 50px 45px;
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
            animation: fadeInScale 0.6s cubic-bezier(0.22,1,0.36,1) both;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
            border-radius: 24px 24px 0 0;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .auth-logo .logo-text {
            font-size: 42px;
            display: inline;
        }

        .auth-logo .logo-sub {
            font-size: 20px;
        }

        .auth-logo p {
            color: var(--text-gray);
            font-size: 14px;
            margin-top: 8px;
        }

        /* 标签切换 */
        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            background: var(--darker-bg);
            border-radius: 14px;
            padding: 4px;
            border: 1px solid var(--border-color);
        }

        .auth-tab {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-gray);
            border-radius: 11px;
            transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
            border: none;
            background: transparent;
            position: relative;
        }

        .auth-tab.active {
            background: var(--primary-color);
            color: var(--dark-bg);
            box-shadow: 0 4px 20px rgba(249,249,0,0.3);
        }

        .auth-tab:not(.active):hover {
            color: var(--text-light);
            background: rgba(255,255,255,0.05);
        }

        .auth-tab i {
            margin-right: 6px;
        }

        /* 表单 */
        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeInUp 0.35s ease both;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: var(--text-gray);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group label i {
            margin-right: 6px;
            color: var(--primary-color);
            width: 16px;
            text-align: center;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            background: var(--darker-bg);
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-light);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: #555;
        }

        .form-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(249,249,0,0.1);
        }

        .form-error {
            display: none;
            color: #f87171;
            font-size: 13px;
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(248,113,113,0.1);
            border-radius: 8px;
        }

        .form-error.visible {
            display: block;
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
            font-family: inherit;
            margin-top: 8px;
        }

        .auth-btn-primary {
            background: var(--primary-color);
            color: var(--dark-bg);
        }

        .auth-btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(249,249,0,0.35);
        }

        .auth-btn-primary:active {
            transform: scale(0.98);
        }

        .auth-btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .auth-footer p {
            color: var(--text-gray);
            font-size: 14px;
        }

        .auth-footer a {
            color: var(--primary-color);
            font-weight: 600;
            transition: color 0.3s;
        }

        .auth-footer a:hover {
            text-shadow: 0 0 12px rgba(249,249,0,0.5);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .auth-card {
                padding: 35px 25px;
                border-radius: 20px;
            }
            .auth-logo .logo-text {
                font-size: 36px;
            }
        }
    </style>
</head>
<body class="auth-page">
    <!-- 顶部导航 -->
    <header>
        <nav class="navbar">
            <div class="logo">
                <span class="logo-text">CYX</span>
                <span class="logo-sub">俱乐部</span>
            </div>
            <ul class="nav-links">
                <li><a href="admin-login.html">admin-login</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <section class="auth-hero">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="logo-text">CYX</span>
                <span class="logo-sub">俱乐部</span>
                <p>员工/管理员登录</p>
            </div>

            <form class="auth-form active" id="empLoginForm">
                <div class="form-group">
                    <label><i class="fas fa-user-tie"></i> 账号</label>
                    <input type="text" class="form-input" id="empUsername" placeholder="请输入员工账号" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i>密码</label>
                    <input type="password" class="form-input" id="empPassword" placeholder="请输入密码" autocomplete="current-password" required>
                </div>
                <div class="form-error" id="empError"></div>
                <button type="submit" class="auth-btn auth-btn-primary" id="empLoginBtn">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
            </form>

            <div class="auth-footer">
                <p>仅限内部员工使用</p>
            </div>
        </div>
    </section>

    <script src="js/auth.js"></script>
    <script>
        // 移动端菜单
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');
        if (hamburger) {
            hamburger.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                hamburger.classList.toggle('active');
            });
        }

        // 员工/管理员登录
        document.getElementById('empLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('empLoginBtn');
            const errorEl = document.getElementById('empError');
            hideError(errorEl);
            setLoading(btn, true);

            const username = document.getElementById('empUsername').value.trim();
            const password = document.getElementById('empPassword').value;

            if (!username || !password) {
                showError(errorEl, '请填写账号和密码');
                setLoading(btn, false);
                return;
            }

            const res = await apiFetch('/auth/login', {
                method: 'POST',
                body: JSON.stringify({ username, password, role: 'employee' })
            });

            if (res.ok && res.data.data && res.data.data.user) {
                const user = res.data.data.user;
                sessionStorage.setItem('cyx_user', JSON.stringify(user));
                if (res.data.data.token) sessionStorage.setItem('cyx_token', res.data.data.token);
                if (user.role === 'admin') window.location.href = 'admin.html';
                else window.location.href = 'employee-dashboard.html';
            } else {
                showError(errorEl, res.data.data?.error || res.data.error || '登录失败，请检查账号密码');
            }
            setLoading(btn, false);
        });

        // 已登录则跳转
        (async () => {
            const user = await checkAuth();
            if (user && (user.role === 'admin' || user.role === 'employee')) {
                window.location.href = user.role === 'admin' ? 'admin.html' : 'employee-dashboard.html';
            }
        })();
    </script>
</body>
</html>
